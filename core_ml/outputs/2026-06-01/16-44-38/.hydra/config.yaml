model:
  n_embed: 512
  block_size: 1024
  num_layers: 4
  num_head: 8
  dropout_prob: 0.1
attention:
  type: mha
  sliding_window_mask: false
  window_size: 512
  positional_encoding: none
  group_size: 2
optimiser:
  lr: 0.001
train:
  epochs: 10
  eval_interval: 1
  batch_size: 4
  eval_batch_size: 6
  block_size: 8
  eval_block_size: 12
  log_interval: 100
  max_iterations_per_epoch: 10000
wandb:
  project: SaiDl
  name: training-run
