model:
  n_embed: 512
  block_size: 1024
  num_layers: 4
  num_head: 8
  dropout_prob: 0.1
attention:
  type: mha
  sliding_window_mask: true
  window_size: 512
optimiser:
  lr: 0.001
train:
  epochs: 50
  eval_interval: 1
  batch_size: 4
  eval_batch_size: 6
  block_size: 8
  eval_block_size: 12
  log_interval: 100
  max_iterations_per_epoch: 10000
